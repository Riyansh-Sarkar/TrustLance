name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
  NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBk-YEPTWRuJ8EOHez-SVtNqI95caYfFd8
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: trustlence.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: trustlence
  NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org:443
  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: 0817841b0116300c97d11d06fbd36c0e

jobs:
  lint-type-test:
    name: Lint · Type-check · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  firestore-rules:
    name: Firestore Rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run Firestore emulator & rules tests
        run: firebase emulators:exec --only firestore "npm run test:rules"
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-type-test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 30

  contract-compile:
    name: Soroban Contract Compile
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/escrow/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/escrow/Cargo.lock', 'contracts/escrow/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cargo Check
        working-directory: contracts/escrow
        run: cargo check --target wasm32-unknown-unknown

  cloud-functions-typecheck:
    name: Cloud Functions Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm ci

      - name: Type-check Functions
        working-directory: functions
        run: npx tsc --noEmit

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-type-test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBk-YEPTWRuJ8EOHez-SVtNqI95caYfFd8
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: trustlence.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: trustlence
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org:443
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: 0817841b0116300c97d11d06fbd36c0e
