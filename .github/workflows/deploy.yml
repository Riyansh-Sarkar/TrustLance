name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
  NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBk-YEPTWRuJ8EOHez-SVtNqI95caYfFd8
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: trustlence.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: trustlence
  NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org:443
  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: 0817841b0116300c97d11d06fbd36c0e

jobs:
  lint-type-test:
    name: Lint · Type-check · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

  firestore-rules:
    name: Firestore Rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Firestore emulator & rules tests
        run: npx firebase-tools emulators:exec --only firestore "npm run test:rules"
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-type-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test'] || ''")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps chromium

      - name: Build Next.js app
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 30

  contract-compile:
    name: Soroban contract compile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/escrow/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/escrow/Cargo.lock', 'contracts/escrow/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo check (wasm32)
        working-directory: contracts/escrow
        run: cargo check --target wasm32-unknown-unknown

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-type-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
